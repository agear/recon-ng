<!doctype html>
<html lang="en" class="dark" style="color-scheme:dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recon-ng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (function(){var t=localStorage.getItem('recon_ng_theme');var h=document.documentElement;if(t==='light'){h.classList.remove('dark');h.style.colorScheme='light';}else{h.classList.add('dark');h.style.colorScheme='dark';}})();
    </script>
  </head>
  <body class="bg-zinc-950 text-zinc-100 font-mono">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
