[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    web: tests that require the Flask web stack

[coverage:run]
source = recon
omit =
    recon/mixins/browser.py
    recon/mixins/github.py
    recon/mixins/oauth.py
    recon/mixins/pwnedlist.py
    recon/mixins/search.py
    recon/mixins/threads.py
    recon/mixins/twitter.py
    recon/core/tasks.py
